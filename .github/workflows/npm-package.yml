name: npm package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  npm:
    name: npm launcher
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test npm launcher
        run: npm test --prefix packages/tailscale-rmcp
      - name: Check npm launcher syntax
        run: npm run check --prefix packages/tailscale-rmcp
      - name: Dry-run npm package
        run: npm pack --dry-run --json ./packages/tailscale-rmcp
