name: tailscale-rmcp

x-common-service: &common-service
  networks:
    - tailscale-rmcp
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  tailscale-mcp:
    <<: *common-service
    # Service is named tailscale-mcp (not tailscale) to avoid conflicting with
    # the Tailscale daemon / tailscaled container that may run on the same host.
    image: ghcr.io/jmagar/tailscale-rmcp:${TAILSCALE_RMCP_VERSION:-latest}
    container_name: tailscale-mcp
    env_file:
      - path: .env
        required: false
    ports:
      - "${TAILSCALE_MCP_PORT:-40040}:40040/tcp"
    volumes:
      - ${HOME}/.tailscale-mcp:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:40040/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  tailscale-rmcp:
    name: ${DOCKER_NETWORK:-tailscale-rmcp}
    external: true
