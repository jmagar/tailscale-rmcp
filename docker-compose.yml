name: tailscale-rmcp

# Local development stack. Builds from this checkout.
services:
  tailscale-mcp:
    extends:
      file: docker-compose.prod.yml
      service: tailscale-mcp
    image: tailscale-rmcp:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  tailscale-rmcp:
    name: ${DOCKER_NETWORK:-tailscale-rmcp}
    external: true
