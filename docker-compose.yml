name: rustscale

# Local development stack. Builds from this checkout.
services:
  tailscale-mcp:
    extends:
      file: docker-compose.prod.yml
      service: tailscale-mcp
    image: rustscale:dev
    pull_policy: build
    build:
      context: .
      dockerfile: config/Dockerfile

networks:
  rustscale:
    name: ${DOCKER_NETWORK:-rustscale}
    external: true
